# PostgreSQL 连接配置（请按需修改）
PG_USER="<your_pg_user>"
PG_DB="<your_pg_db>"
PG_PORT="5432"
PG_HOST="<your_pg_host>"
PG_BIN="../assets/tools/postgres18/bin/psql"          # 实际的 psql 路径

# 认证：两种方式二选一（不要同时填写）
# 方式 A：在配置里写密码（脚本会生成临时 pgpass 并在退出时删除）
PG_PASSWORD="<YOUR_PASSWORD>"

# 方式 B：使用已有 pgpass 文件
#PGPASS_FILE="${HOME}/.pgpass"

# TLS（服务器验证） - 强制启用 verify-full（完全验证）
USE_TLS="yes"                    # yes/no（建议：yes）
SSL_MODE="verify-full"           # 通常 verify-full
CA_CERT="../assets/certs/Internal_Root_CA.crt"  # CA 证书路径（必须存在并可读）

# mTLS（客户端证书） - 默认关闭
USE_MTLS="no"
CLIENT_CERT="/etc/ssl/certs/pg_client.crt"   # 客户端证书（用于 mTLS，若开启请填写）
CLIENT_KEY="/etc/ssl/private/pg_client.key"  # 客户端私钥（用于 mTLS，若开启请填写）
# 如果客户端私钥受密码保护，可填写解密密码（脚本会尝试使用 openssl 解密为临时明文 key）
# 注意：建议上传未加密的 key 并确保文件权限为 600，以便无人值守。
#CLIENT_KEY_PASSWORD="optional_passphrase"

# 备份相关
BACKUP_LABEL="Scheduled snapshots"
DELAY_MINUTES=10
