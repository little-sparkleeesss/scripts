# -------------------------- 工具链路径 (复用性配置) --------------------------
# 如果工具在系统 PATH 中（如 /usr/bin），可留空。
# 如果工具在特定目录（如 ~/pg_bin），请填写该目录。
# 留空自动查找：优先系统 PATH，否则 find assets/tools/ 目录
# 如使用便携版 PG，指向打包目录（或留空让自动发现找到壳脚本）
PG_BIN_DIR=""
ZSTD_BIN_DIR=""  # 留空则默认使用系统 zstd

# -------------------------- 数据库连接配置 --------------------------
DB_HOST="<your_pg_host>"
DB_PORT="5432"
DB_USER="<your_pg_user>"
DB_PASS="<YOUR_PASSWORD>"

# -------------------------- 数据库 SSL/mTLS 配置 --------------------------
DB_SSL_ENABLE="true"            # 是否启用 SSL
DB_SSL_CA="../assets/certs/Internal_Root_CA.crt"  # CA 证书路径
DB_MTLS_ENABLE="false"          # 是否启用双向认证 (mTLS)
DB_MTLS_CERT="/ql/data/config/certs/client.crt" # 客户端证书 (mTLS 开启时必填)
DB_MTLS_KEY="/ql/data/config/certs/client.key"   # 客户端私钥 (mTLS 开启时必填)

# -------------------------- 备份/压缩配置 --------------------------
LOCAL_STAGING_DIR="/tmp/pg_backup_stage"
COMPRESS_LEVEL=19
BACKUP_PREFIX="pg_full_backup"

# -------------------------- NAS (SFTP) 配置 --------------------------
# 本段由 Python local_runner.py 通过 paramiko SFTP 消费
# 私钥和密码二选一，paramiko 自动尝试
NAS_HOST="<your_nas_host>"
NAS_PORT="22"
NAS_USER="<your_nas_user>"
NAS_REMOTE_DIR="<your_nas_remote_dir>"
# --- 私钥认证 ---
NAS_PRIVATE_KEY="../assets/keys/id_ed25519"
# --- 密码认证 ---
NAS_PASS="<your_nas_password>"
# NAS 远程服务器公钥 (用于防止中间人攻击 MITM)
# 获取方法: ssh-keyscan -p [端口] [主机名/IP]
NAS_HOST_KEY="<your_nas_host_key>"
